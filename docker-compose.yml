services:
  postgres:
    image: postgres:16-alpine
    container_name: sales-ai-system-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_ai_system
    ports:
      - "5432:5432"
    volumes:
      - sales_ai_system_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_ai_system"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sales_ai_system_postgres:
