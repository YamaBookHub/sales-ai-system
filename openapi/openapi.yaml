openapi: 3.0.3
info:
  title: Sales AI System API
  version: 1.0.0
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
paths:
  /:
    get:
      summary: Local sales dashboard HTML
      security: []
      responses:
        '200':
          description: Local dashboard
          content:
            text/html:
              schema:
                type: string
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200': { description: OK }
  /api/companies:
    get:
      summary: List companies
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Company list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyListResponse'
    post:
      summary: Create company
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCompanyRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
  /api/projects:
    get:
      summary: List crowdfunding projects
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/ProjectStatus' }
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectListResponse' }
    post:
      summary: Create crowdfunding project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProjectRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CrowdfundingProject' }
  /api/projects/import/campfire:
    post:
      summary: Import CAMPFIRE project as company, project and lead
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportCampfireProjectRequest' }
      responses:
        '200':
          description: Imported
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportCampfireProjectResponse' }
  /api/projects/categories/campfire:
    get:
      summary: List CAMPFIRE category candidates for import search
      responses:
        '200':
          description: CAMPFIRE category candidates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampfireCategoryListResponse' }
  /api/projects/search/campfire:
    post:
      summary: Search CAMPFIRE project URL candidates before importing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchCampfireProjectsRequest' }
      responses:
        '200':
          description: CAMPFIRE project candidates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampfireSearchResponse' }
  /api/leads:
    get:
      summary: List sales leads
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/LeadStatus' }
        - name: priority
          in: query
          schema: { $ref: '#/components/schemas/LeadPriority' }
      responses:
        '200':
          description: Lead list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadListResponse' }
    post:
      summary: Create lead
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLeadRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalesLead' }
  /api/leads/{leadId}:
    get:
      summary: Get sales lead
      parameters:
        - $ref: '#/components/parameters/LeadId'
      responses:
        '200':
          description: Lead detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalesLeadWithRelations' }
    patch:
      summary: Update sales lead management fields
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateLeadRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalesLead' }
  /api/leads/{leadId}/score:
    post:
      summary: Recalculate lead score
      parameters:
        - $ref: '#/components/parameters/LeadId'
      responses:
        '200':
          description: Score result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadScore' }
  /api/leads/{leadId}/tasks:
    get:
      summary: List tasks for a sales lead
      parameters:
        - $ref: '#/components/parameters/LeadId'
        - name: scope
          in: query
          schema:
            type: string
            enum: [active, all]
            default: active
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiTaskListResponse' }
        '404': { description: Lead not found }
    post:
      summary: Create a next-action task for a sales lead
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTaskRequest' }
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiTaskResponse' }
        '400': { description: Invalid task or assignee }
        '404': { description: Lead not found }
        '409': { description: Terminal lead }
  /api/tasks/{taskId}:
    patch:
      summary: Update a next-action task
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTaskRequest' }
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiTaskResponse' }
        '400': { description: Invalid task or assignee }
        '404': { description: Task not found }
        '409': { description: Invalid task status transition }
  /api/task-assignees:
    get:
      summary: List active task assignees
      responses:
        '200':
          description: Active users
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiTaskAssigneeListResponse' }
  /api/mails:
    get:
      summary: List mails
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/EmailStatus' }
      responses:
        '200':
          description: Mail list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/OutreachEmailWithRelations' } }
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
  /api/replies:
    get:
      summary: List Reply Inbox items
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: category
          in: query
          schema: { $ref: '#/components/schemas/ReplyCategory' }
        - name: attention
          in: query
          schema:
            type: string
            enum: [all, needs_action, manager_review, stop_followup]
            default: all
        - name: leadStatus
          in: query
          schema: { $ref: '#/components/schemas/LeadStatus' }
        - name: sort
          in: query
          schema:
            type: string
            enum: [receivedAt, priority, confidence]
            default: receivedAt
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Reply Inbox list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiReplyInboxResponse' }
        '400':
          description: Invalid filter or pagination
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/mails/draft:
    post:
      summary: Create AI assisted mail draft
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateMailDraftRequest' }
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}/request-review:
    post:
      summary: Request mail review
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Review requested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}/request-rereview:
    post:
      summary: Request mail re-review after rejection
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Re-review requested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}:
    patch:
      summary: Update mail subject and body
      parameters:
        - $ref: '#/components/parameters/EmailId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateMailRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}/checklist:
    get:
      summary: Get pre-send checklist for mail
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Checklist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MailChecklistResponse' }
    patch:
      summary: Update pre-send checklist for mail
      parameters:
        - $ref: '#/components/parameters/EmailId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateMailChecklistRequest' }
      responses:
        '200':
          description: Checklist updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MailChecklistResponse' }
  /api/mails/{emailId}/approve:
    post:
      summary: Approve mail draft
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}/reject:
    post:
      summary: Reject mail draft
      parameters:
        - $ref: '#/components/parameters/EmailId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectMailRequest' }
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}/queue:
    post:
      summary: Queue approved mail for sending
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/{emailId}/retry:
    post:
      summary: Retry failed mail
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Retry queued
  /api/mails/{emailId}/cancel:
    post:
      summary: Cancel mail
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutreachEmail' }
  /api/mails/threads/{gmailThreadId}:
    get:
      summary: Get mail thread
      parameters:
        - name: gmailThreadId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Thread
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MailThreadResponse' }
  /t/open/{emailId}.png:
    get:
      summary: Tracking pixel endpoint
      security: []
      parameters:
        - $ref: '#/components/parameters/EmailId'
      responses:
        '200': { description: 1x1 gif }
  /t/click/{token}:
    get:
      summary: Tracking link redirect
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '302': { description: Redirect }
  /api/ai/leads/{leadId}/generate-mail:
    post:
      summary: Generate mail draft by AI
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateMailRequest' }
      responses:
        '201':
          description: Generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiMailGenerationResponse' }
  /api/ai/leads/{leadId}/email-draft:
    post:
      summary: Generate mail draft by AI
      parameters:
        - $ref: '#/components/parameters/LeadId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateMailRequest' }
      responses:
        '201':
          description: Generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiMailGenerationResponse' }
  /api/ai/leads/{leadId}/generations:
    get:
      summary: List AI generations for lead
      parameters:
        - $ref: '#/components/parameters/LeadId'
      responses:
        '200':
          description: AI generation history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiGenerationListResponse' }
  /api/ai/replies/{replyId}/classify:
    post:
      summary: Classify reply by AI
      parameters:
        - name: replyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Classified
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmailReply' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    LeadId:
      name: leadId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EmailId:
      name: emailId
      in: path
      required: true
      schema: { type: string, format: uuid }
  schemas:
    ProjectStatus:
      type: string
      enum: [discovered, active, ended, suspended, unknown]
    LeadStatus:
      type: string
      enum: [discovered, qualified, drafted, reviewing, approved, queued, contacted, replied, meeting_candidate, rejected, no_response, archived]
    LeadPriority:
      type: string
      enum: [high, medium, low]
    TaskStatus:
      type: string
      enum: [todo, doing, done, cancelled]
    EmailStatus:
      type: string
      enum: [draft, in_review, rejected, approved, queued, sending, sent, failed, cancelled]
    ReplyCategory:
      type: string
      enum: [interested, need_info, meeting_request, not_interested, unsubscribe, auto_reply, complaint, unknown]
    Company:
      type: object
      required: [id, name, isBlocked, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        normalizedName: { type: string, nullable: true }
        websiteUrl: { type: string, nullable: true }
        inquiryUrl: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        memo: { type: string, nullable: true }
        isBlocked: { type: boolean }
        blockedReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateCompanyRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        websiteUrl: { type: string, nullable: true }
        inquiryUrl: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        memo: { type: string, nullable: true }
    CompanyListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Company' }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
    CrowdfundingProject:
      type: object
      properties:
        id: { type: string, format: uuid }
        platformId: { type: string, format: uuid }
        companyId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        url: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        amount: { type: integer }
        supporterCount: { type: integer }
        category: { type: string, nullable: true }
        endDate: { type: string, format: date-time, nullable: true }
    CreateProjectRequest:
      type: object
      required: [platformId, title, url]
      properties:
        platformId: { type: string, format: uuid }
        companyId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        url: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        amount: { type: integer, default: 0 }
        supporterCount: { type: integer, default: 0 }
        category: { type: string, nullable: true }
    ImportCampfireProjectRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          example: https://camp-fire.jp/projects/935270/view
    ImportCampfireProjectResponse:
      type: object
      properties:
        platform:
          type: object
          additionalProperties: true
        company: { $ref: '#/components/schemas/Company' }
        project: { $ref: '#/components/schemas/CrowdfundingProject' }
        lead: { $ref: '#/components/schemas/SalesLead' }
        scraped:
          type: object
          additionalProperties: true
    SearchCampfireProjectsRequest:
      type: object
      properties:
        keyword:
          type: string
          description: 会社名、案件名、URL、商品名の曖昧検索キーワード
        category:
          type: string
          description: 検索用カテゴリvalue。CAMPFIREカテゴリURL、preset:カテゴリ名、旧形式のカテゴリ名を受け付ける。
        profileProjectMin:
          type: integer
          minimum: 0
          description: CAMPFIRE検索結果ページ、または候補URLのプロジェクトページ上部で取得できた過去プロジェクト数の下限。本文解析やプロフィール深掘りは行わない。
        profileProjectMax:
          type: integer
          minimum: 0
          description: CAMPFIRE検索結果ページ、または候補URLのプロジェクトページ上部で取得できた過去プロジェクト数の上限。本文解析やプロフィール深掘りは行わない。
        limit:
          type: integer
          enum: [10, 50, 100]
          default: 100
          description: 取得上限。画面上の最大表示件数は検索結果エリア側で制御する。
    CampfireCategoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              value:
                type: string
                description: 検索用カテゴリvalue。CAMPFIREカテゴリURLまたはpreset:カテゴリ名。
    CampfireSearchItem:
      type: object
      properties:
        title: { type: string }
        url: { type: string }
        amount: { type: integer }
        supporterCount: { type: integer }
        category: { type: string }
        daysLeft: { type: integer, nullable: true }
        isActive: { type: boolean }
        profileProjectCount: { type: integer, nullable: true }
        summary: { type: string }
    CampfireSearchResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CampfireSearchItem' }
        total: { type: integer }
    ProjectListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/CrowdfundingProject' } }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
    SalesLead:
      type: object
      properties:
        id: { type: string, format: uuid }
        companyId: { type: string, format: uuid }
        projectId: { type: string, format: uuid, nullable: true }
        status: { $ref: '#/components/schemas/LeadStatus' }
        priority: { $ref: '#/components/schemas/LeadPriority' }
        score: { type: integer }
        reason: { type: string, nullable: true }
        source: { type: string }
        ownerMemo: { type: string, nullable: true }
        contactEmail: { type: string, nullable: true }
        contactFormUrl: { type: string, nullable: true }
        siteMessageUrl: { type: string, nullable: true }
        contactMemo: { type: string, nullable: true }
        sendMethod: { type: string, nullable: true }
        sentAt: { type: string, format: date-time, nullable: true }
        nextFollowUpAt: { type: string, format: date-time, nullable: true }
        brandWebsiteUrl: { type: string, nullable: true }
        instagramUrl: { type: string, nullable: true }
        tiktokUrl: { type: string, nullable: true }
        xUrl: { type: string, nullable: true }
        brandAnalysisMemo: { type: string, nullable: true }
        snsAnalysisMemo: { type: string, nullable: true }
        nextActionAt: { type: string, format: date-time, nullable: true }
    CreateLeadRequest:
      type: object
      required: [companyId]
      properties:
        companyId: { type: string, format: uuid }
        projectId: { type: string, format: uuid, nullable: true }
        source: { type: string, default: manual }
        ownerMemo: { type: string, nullable: true }
    UpdateLeadRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/LeadStatus' }
        priority: { $ref: '#/components/schemas/LeadPriority' }
        ownerMemo: { type: string, nullable: true }
        contactEmail: { type: string, nullable: true }
        contactFormUrl: { type: string, nullable: true }
        siteMessageUrl: { type: string, nullable: true }
        contactMemo: { type: string, nullable: true }
        sendMethod: { type: string, nullable: true }
        sentAt: { type: string, format: date-time, nullable: true }
        nextFollowUpAt: { type: string, format: date-time, nullable: true }
        nextActionAt: { type: string, format: date-time, nullable: true }
        brandWebsiteUrl: { type: string, nullable: true }
        instagramUrl: { type: string, nullable: true }
        tiktokUrl: { type: string, nullable: true }
        xUrl: { type: string, nullable: true }
        brandAnalysisMemo: { type: string, nullable: true }
        snsAnalysisMemo: { type: string, nullable: true }
    LeadListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SalesLeadWithRelations' } }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
    TaskAssignee:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        leadId: { type: string, format: uuid }
        title: { type: string, maxLength: 120 }
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/TaskStatus' }
        dueAt: { type: string, format: date-time, nullable: true }
        doneAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        assignee: { $ref: '#/components/schemas/TaskAssignee' }
    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 5000 }
        dueAt: { type: string, format: date-time, nullable: true }
        assigneeId: { type: string, format: uuid, nullable: true }
    UpdateTaskRequest:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
